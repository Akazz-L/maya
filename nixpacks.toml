# Nixpacks detects pyproject.toml at the repo root and runs the Python provider
# only — frontend/package.json is a directory down, so Node is never installed
# and `vite build` never runs. Without this file the deploy boots fine but every
# page load 503s ("Frontend build not found"), because backend/main.py serves
# the SPA out of frontend/dist and dist/ is gitignored.
#
# "..." keeps the packages the Python provider already resolved.
[phases.setup]
nixPkgs = ["...", "nodejs_22"]

[phases.build]
dependsOn = ["install"]
cmds = ["cd frontend && npm ci && npm run build"]
