[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# No startCommand: the Dockerfile CMD owns startup, so there is a single source
# of truth for how the app boots (migrations, then uvicorn on $PORT).
[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
